# Arbiter 工具注册表
# 仅在此登记且 status: active 的工具对基金经理 agent 可见、可用。

tools:
  get_market_bars_batch:
    status: active
    contract: contracts/get_market_bars_batch.yaml
    impl: impl/get_market_bars_batch.py
    description: 批量获取多标的市场行情数据（OHLCV）
  get_nt_bar_schema:
    status: active
    contract: contracts/get_nt_bar_schema.yaml
    impl: impl/get_nt_bar_schema.py
    description: 获取 NautilusTrader Bar 数据结构的 schema 定义
  get_symbol_venue:
    status: active
    contract: contracts/get_symbol_venue.yaml
    impl: impl/get_symbol_venue.py
    description: 将标的代码映射为 NT BarType 所需的 venue（交易所）标识
  convert_bars_to_nt:
    status: active
    contract: contracts/convert_bars_to_nt.yaml
    impl: impl/convert_bars_to_nt.py
    description: 将 get_market_bars_batch 输出转为 NautilusTrader 兼容格式（adapter）
  run_backtest:
    status: active
    contract: contracts/run_backtest.yaml
    impl: impl/run_backtest.py
    description: 执行 NautilusTrader 回测，输入为 convert_bars_to_nt 格式
  create_portfolio:
    status: active
    contract: contracts/create_portfolio.yaml
    impl: impl/create_portfolio.py
    description: 创建模型组合并持久化到 system/state/portfolios/
  get_portfolio:
    status: active
    contract: contracts/get_portfolio.yaml
    impl: impl/get_portfolio.py
    description: 读取已持久化的模型组合
  analyze_exposure:
    status: active
    contract: contracts/analyze_exposure.yaml
    impl: impl/analyze_exposure.py
    description: 分析组合风险暴露（行业、集中度）
  simulate_rebalance:
    status: active
    contract: contracts/simulate_rebalance.yaml
    impl: impl/simulate_rebalance.py
    description: 模拟组合调仓，生成调仓建议
  generate_order_plan:
    status: active
    contract: contracts/generate_order_plan.yaml
    impl: impl/generate_order_plan.py
    description: 从 rebalance proposal 生成可执行的订单计划
  calculate_portfolio_performance:
    status: active
    contract: contracts/calculate_portfolio_performance.yaml
    impl: impl/calculate_portfolio_performance.py
    description: 计算组合表现指标（收益、回撤、波动率、夏普、基准对比）
  get_watchlist:
    status: active
    contract: contracts/get_watchlist.yaml
    impl: impl/get_watchlist.py
    description: 获取观察列表，可选包含行情数据
  update_watchlist:
    status: active
    contract: contracts/update_watchlist.yaml
    impl: impl/update_watchlist.py
    description: 更新观察列表（添加/移除 symbol，创建/删除）
  get_news_digest:
    status: active
    contract: contracts/get_news_digest.yaml
    impl: impl/get_news_digest.py
    description: 获取新闻并生成摘要（Yahoo Finance）
  connect_broker:
    status: active
    contract: contracts/connect_broker.yaml
    impl: impl/connect_broker.py
    description: 建立券商连接（IB paper/live 模式）
  get_broker_account:
    status: active
    contract: contracts/get_broker_account.yaml
    impl: impl/get_broker_account.py
    description: 获取券商账户摘要（现金、购买力）
  get_broker_positions:
    status: active
    contract: contracts/get_broker_positions.yaml
    impl: impl/get_broker_positions.py
    description: 获取券商当前持仓列表
  submit_order:
    status: active
    contract: contracts/submit_order.yaml
    impl: impl/submit_order.py
    description: 提交订单（市价/限价/止损）
  get_order_status:
    status: active
    contract: contracts/get_order_status.yaml
    impl: impl/get_order_status.py
    description: 查询订单状态
  cancel_order:
    status: active
    contract: contracts/cancel_order.yaml
    impl: impl/cancel_order.py
    description: 撤销订单
