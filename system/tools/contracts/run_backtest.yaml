# Contract for run_backtest (TASK_0008)
# 输入 market data 兼容 convert_bars_to_nt 输出

name: run_backtest
description: 执行 NautilusTrader 回测，输入为 convert_bars_to_nt 格式的 bars

input:
  strategy_id:
    type: string
    required: true
    description: 策略标识，如 momentum_20d, mean_reversion, ema_cross
  nt_bars:
    type: object
    required: true
    description: convert_bars_to_nt 的输出（含 data、meta）
    properties:
      data:
        type: object
        additionalProperties:
          type: array
          items:
            type: object
            properties:
              bar_type: {}
              open: {}
              high: {}
              low: {}
              close: {}
              volume: {}
              ts_event: {}
              ts_init: {}
      meta:
        type: object
  symbols:
    type: array[string]
    required: false
    description: 用于报告/过滤，缺省时从 nt_bars.data 推断
  start:
    type: string
    required: false
    description: 回测开始日期，ISO 8601
  end:
    type: string
    required: false
    description: 回测结束日期，ISO 8601
  config:
    type: object
    required: false
    description: 策略配置覆盖。momentum_20d/mean_reversion 支持 lookback_period, trade_size；mean_reversion 额外支持 deviation_threshold

output:
  type: object
  properties:
    success:
      type: boolean
    report:
      type: object
      description: 回测报告
      properties:
        account_summary: {}
        positions: {}
        order_fills: {}
        metrics:
          type: object
          description: 结构化回测指标 (TICKET_0006)
          properties:
            sharpe_ratio: { type: number, description: 年化夏普比率 }
            max_drawdown_pct: { type: number, description: 最大回撤 % }
            cagr_pct: { type: number, description: 年化收益率 % }
            win_rate_pct: { type: number, description: 胜率 % }
            avg_trade_pnl: { type: number, description: 平均单笔盈亏 }
            total_trades: { type: integer, description: 总交易次数 }
            profit_factor: { type: number, description: 盈亏比 }
            calmar_ratio: { type: number, description: Calmar 比率 }
            volatility_pct: { type: number, description: 年化波动率 % }
    errors:
      type: array
    meta:
      type: object
      properties:
        strategy_id: {}
        symbols: {}
        start: {}
        end: {}
        bars_loaded: {}
        status: {}
