# Contract for get_market_bars_batch
# TICKET_20250314_001; Source: TASK_0001D (IB data path validation)

name: get_market_bars_batch
description: 批量获取多标的市场行情数据（OHLCV）

input:
  symbols:
    type: array[string]
    required: true
    description: 标的代码列表，如 ["AAPL", "MSFT"]
    example: ["AAPL", "MSFT", "NVDA", "AMZN", "META"]
    min_items: 1
    max_items: 10
  lookback_days:
    type: integer
    required: false
    description: 回溯天数，与 start_date/end_date 二选一；缺省 20
    default: 20
    min: 1
    max: 252
  start_date:
    type: string
    required: false
    description: 历史回测开始日期 YYYY-MM-DD，与 end_date 同时提供时优先于 lookback_days；日期范围不可超过 2520 天（约 7 年）
    example: "2023-01-01"
  end_date:
    type: string
    required: false
    description: 历史回测结束日期 YYYY-MM-DD，与 start_date 必须成对出现；日期范围不可超过 2520 天
    example: "2024-01-02"
  timeframe:
    type: string
    required: false
    description: K线周期
    default: "1d"
    enum: ["1m", "5m", "15m", "1h", "4h", "1d"]
  source:
    type: string
    required: false
    description: 数据源提供商；ib 时需先 connect_broker，使用真实 IB API
    default: "yahoo"
    enum: ["yahoo", "ib", "polygon", "alpaca"]
  connection_id:
    type: string
    required: false
    description: IB 连接 ID（connect_broker 返回）；source=ib 时可选，不传则复用最近连接
  provider:
    type: string
    required: false
    description: 兼容参数，已弃用，请使用 source
    deprecated: true
  mock_mode:
    type: boolean
    required: false
    description: true 时快速返回模拟 OHLCV 数据，用于回测 mock 验收；TICKET_20250314_BACKTEST_001_FOLLOWUP_007
    default: false

output:
  type: object
  properties:
    success:
      type: boolean
      description: 查询是否成功
    data:
      type: object
      description: 按 symbol 分组的数据
      additionalProperties:
        type: array
        items:
          type: object
          properties:
            timestamp: { type: string, format: datetime }
            open: { type: number }
            high: { type: number }
            low: { type: number }
            close: { type: number }
            volume: { type: integer }
    errors:
      type: array
      items:
        type: object
        properties:
          symbol: { type: string }
          error: { type: string }
    meta:
      type: object
      properties:
        requested_symbols: { type: integer }
        returned_symbols: { type: integer }
        timeframe: { type: string }
        source: { type: string }
        latency_ms: { type: integer, description: 查询耗时(毫秒) }
        data_quality_score: { type: number, description: 数据质量评分(0-1) }
