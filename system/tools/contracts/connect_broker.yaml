# Contract for connect_broker
# TICKET_20250314_002; Source: TASK_0021 (Broker execution adapter validation)

name: connect_broker
description: 建立券商连接（Interactive Brokers），支持 paper/live 模式

input:
  broker:
    type: string
    required: true
    enum: ["ib"]
    description: 券商标识
  mode:
    type: string
    required: true
    enum: ["live", "paper"]
    description: live=实盘(TWS 7496/Gateway 4001), paper=IB Paper 模拟(TWS 7497/Gateway 4002)
  timeout_ms:
    type: integer
    required: false
    default: 5000
    description: 连接超时毫秒
    min: 1000
    max: 30000
  host:
    type: string
    required: false
    default: "127.0.0.1"
    description: IB Gateway/TWS 主机
  port:
    type: integer
    required: false
    description: |
      live 默认 7496 (TWS) / 4001 (Gateway)
      paper 默认 4002 (Gateway) / 7497 (TWS)
  client_id:
    type: integer
    required: false
    default: 1
    description: IB API client ID
  expected_account_id:
    type: string
    required: false
    description: |
      live 模式：指定要使用的 IB 账户 ID（如 U12345678）。
      连接时会验证 Gateway 登录的账户与此一致，不一致则拒绝连接。
      确保实盘交易在指定账户进行。

output:
  type: object
  properties:
    success: { type: boolean }
    error_message: { type: string }
    timestamp: { type: string, format: date-time }
    connection_id: { type: string }
    status: { type: string, enum: ["connected", "failed"] }
    latency_ms: { type: integer }
